services:
  api:
    restart: unless-stopped

  web:
    restart: unless-stopped

  db:
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    volumes:
      - ../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - app_network
