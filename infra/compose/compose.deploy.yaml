services:
  api:
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  web:
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  db:
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    volumes:
      - ../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - app_network
