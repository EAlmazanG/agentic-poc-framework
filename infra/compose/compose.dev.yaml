services:
  db:
    ports:
      - "5432:5432"

  api:
    build:
      target: dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /workspace/apps/api
    volumes:
      - ../../apps/api:/workspace/apps/api
    ports:
      - "8000:8000"

  web:
    build:
      target: dev
    working_dir: /workspace/apps/web
    volumes:
      - ../../apps/web/src:/workspace/apps/web/src
      - ../../apps/web/public:/workspace/apps/web/public
      - ../../apps/web/package.json:/workspace/apps/web/package.json
      - ../../apps/web/package-lock.json:/workspace/apps/web/package-lock.json
      - ../../apps/web/tsconfig.json:/workspace/apps/web/tsconfig.json
      - ../../apps/web/next-env.d.ts:/workspace/apps/web/next-env.d.ts
      - ../../apps/web/next.config.js:/workspace/apps/web/next.config.js
      - ../../apps/web/postcss.config.js:/workspace/apps/web/postcss.config.js
      - ../../apps/web/tailwind.config.js:/workspace/apps/web/tailwind.config.js
      - ../../apps/web/jest.config.js:/workspace/apps/web/jest.config.js
      - ../../apps/web/jest.setup.ts:/workspace/apps/web/jest.setup.ts
      - web_node_modules:/workspace/apps/web/node_modules
    ports:
      - "3000:3000"

volumes:
  web_node_modules:
